<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GATE ENGLISH · MUNICH TRIP</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Gate English">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12213D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --bg:      #12213D;
  --accent:  #F6A21C;
  --card:    #F5F2EA;
  --success: #3E8E63;
  --error:   #C0463A;
  --dk:      #12213D;
  --board:   #060d18;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  background-color:#12213D;
  background-image:
    radial-gradient(ellipse at 45% 28%, #172844 0%, #12213D 68%),
    repeating-linear-gradient(
      -55deg,
      transparent 0px, transparent 11px,
      rgba(255,255,255,.022) 11px, rgba(255,255,255,.022) 12px,
      transparent 12px, transparent 24px,
      rgba(255,255,255,.014) 24px, rgba(255,255,255,.014) 25px
    );
  background-attachment:fixed}
#app{min-height:100dvh;max-width:448px;margin:0 auto;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,16px)}

/* ── typography ── */
.mono{font-family:'Courier New','Lucida Console',monospace}

/* ── common header ── */
.app-hd{padding:24px 16px 16px;border-bottom:1px solid rgba(246,162,28,.22)}
.app-hd h1{font-family:'Courier New',monospace;font-size:.82rem;
  letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase}
.app-hd .sub{font-size:.68rem;color:rgba(255,255,255,.38);margin-top:4px;letter-spacing:.07em}

/* ── spinner ── */
.spinner{width:28px;height:28px;border:2px solid rgba(246,162,28,.18);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════ HOME ══════════════════ */
.home-title{font-family:'Space Grotesk','Courier New',monospace;font-size:.95rem;
  letter-spacing:.28em;color:var(--accent);font-weight:700;text-transform:uppercase}
.home-sub{font-size:.68rem;color:rgba(255,255,255,.38);margin-top:4px;letter-spacing:.07em}

.cat-grid{padding:18px 16px 4px;display:flex;flex-direction:column;gap:12px}

/* boarding-pass card */
.cat-card{background:var(--card);border-radius:10px;
  padding:15px 14px 15px 20px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:
    0 1px 2px rgba(0,0,0,.14),
    0 6px 20px rgba(0,0,0,.28),
    0 0 0 .5px rgba(255,255,255,.04);
  transition:transform .12s,box-shadow .12s;
  /* notch punch-outs on left edge */
  mask-image:
    radial-gradient(circle at 0% 33%,transparent 11px,#fff 12px),
    radial-gradient(circle at 0% 67%,transparent 11px,#fff 12px),
    linear-gradient(#fff,#fff);
  mask-composite:intersect,intersect;
  -webkit-mask-image:
    radial-gradient(circle at 0% 33%,transparent 11px,#fff 12px),
    radial-gradient(circle at 0% 67%,transparent 11px,#fff 12px),
    linear-gradient(#fff,#fff);
  -webkit-mask-composite:destination-in,destination-in}
.cat-card:active{transform:scale(.975);
  box-shadow:0 1px 2px rgba(0,0,0,.1),0 3px 8px rgba(0,0,0,.18),
    0 0 0 .5px rgba(255,255,255,.04)}
/* accent bar */
.cat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:5px;background:var(--accent)}
/* barcode strip */
.cat-card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:18px;
  pointer-events:none;
  background:repeating-linear-gradient(90deg,
    rgba(18,33,61,.07) 0,rgba(18,33,61,.07) 1.5px,
    transparent 1.5px,transparent 3px,
    rgba(18,33,61,.05) 3px,rgba(18,33,61,.05) 4px,
    transparent 4px,transparent 5.5px,
    rgba(18,33,61,.09) 5.5px,rgba(18,33,61,.09) 6.5px,
    transparent 6.5px,transparent 9px,
    rgba(18,33,61,.05) 9px,rgba(18,33,61,.05) 10.5px,
    transparent 10.5px,transparent 12px,
    rgba(18,33,61,.08) 12px,rgba(18,33,61,.08) 13px,
    transparent 13px,transparent 15px,
    rgba(18,33,61,.06) 15px,rgba(18,33,61,.06) 16px,
    transparent 16px,transparent 18px)}

.cat-icon{flex-shrink:0;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center}
.cat-body{flex:1;min-width:0}
.cat-lbl{font-family:'Space Grotesk','Courier New',monospace;font-size:.68rem;
  letter-spacing:.26em;color:var(--accent);font-weight:700;text-transform:uppercase}
.cat-jp{font-size:.9rem;color:var(--dk);font-weight:600;margin-top:3px}

.reset-btn{display:block;text-align:center;font-size:.68rem;
  color:rgba(255,255,255,.28);background:none;border:none;
  text-decoration:underline;cursor:pointer;margin:8px auto 20px}

/* ── drag & drop ── */
.cat-card[data-key]{cursor:grab;-webkit-user-select:none;user-select:none}
.cat-card.dnd-ghost{opacity:.18;pointer-events:none;
  box-shadow:0 1px 2px rgba(0,0,0,.1)!important}
.drag-handle{flex-shrink:0;padding:2px 0 2px 6px;line-height:1;
  color:rgba(18,33,61,.2);font-size:.95rem;letter-spacing:-.08em}

/* ══════════════════ DEPARTURE BOARD ══════════════════ */
.bw{padding:16px}
.bw-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.btn-back{background:none;border:1px solid rgba(246,162,28,.38);
  color:var(--accent);font-family:'Space Grotesk','Courier New',monospace;
  font-size:.7rem;letter-spacing:.1em;padding:6px 12px;border-radius:4px;cursor:pointer}
.bw-title{font-family:'Space Grotesk','Courier New',monospace;font-size:.82rem;
  letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase}
.sboard-hd{display:flex;justify-content:space-between;
  padding:2px 4px 10px;margin-bottom:2px}
.sboard-hd span{font-family:'Space Grotesk','Courier New',monospace;font-size:.58rem;
  letter-spacing:.22em;color:rgba(246,162,28,.5);text-transform:uppercase}
.scard{background:var(--card);border-radius:8px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  position:relative;overflow:hidden;padding:12px 14px 12px 18px;
  box-shadow:0 1px 2px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.2),
    0 0 0 .5px rgba(255,255,255,.04);
  transition:transform .1s,box-shadow .1s;margin-bottom:8px}
.scard:last-child{margin-bottom:0}
.scard:active{transform:scale(.98);box-shadow:0 1px 2px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.14)}
.scard::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:var(--accent)}
.scard-icon{flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:#B5710E}
.scard-body{flex:1;min-width:0}
/* cream card — explicit dark colors to defeat inherited body{color:#fff} */
.scard .scard-en{font-family:'Space Grotesk','Courier New',monospace;font-size:.65rem;
  letter-spacing:.14em;color:#12213D;font-weight:600;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard .scard-jp{font-size:.68rem;color:#5C6B7A;margin-top:2px;line-height:1.4}
.sbadge{font-family:'Space Grotesk','Courier New',monospace;font-size:.58rem;
  letter-spacing:.08em;font-weight:700;padding:4px 9px;border-radius:20px;flex-shrink:0;
  white-space:nowrap}
/* READY: dark navy text + amber outline — readable on cream (#12213D on #F5F2EA ≈ 10:1) */
.scard .sbadge.ready{color:#12213D;border:1px solid rgba(176,109,14,.55);
  background:rgba(246,162,28,.12)}
/* CLEARED: white text on green — readable */
.scard .sbadge.cleared{color:#fff;background:#3E8E63;border:1px solid #3E8E63}

/* ══════════════════ PRACTICE ══════════════════ */
.pw{padding:12px 16px 24px}
.pw-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}

/* boarding pass card */
.pass{background:var(--card);border-radius:10px;overflow:hidden;
  box-shadow:0 4px 28px rgba(0,0,0,.38)}

.pass-hd{background:var(--dk);padding:16px 18px 14px;
  border-bottom:3px dashed rgba(246,162,28,.38)}
.pass-en{font-family:'Courier New',monospace;font-size:.88rem;
  letter-spacing:.2em;color:var(--accent);font-weight:700;text-transform:uppercase}
.pass-jp{font-size:.78rem;color:rgba(255,255,255,.55);margin-top:3px}
.pass-meta{display:flex;align-items:center;gap:10px;margin-top:10px}
.turn-lbl{font-family:'Courier New',monospace;font-size:.62rem;
  letter-spacing:.14em;color:rgba(255,255,255,.5);flex-shrink:0}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s}

/* status (split-flap) */
.sboard{background:#030810;padding:11px 18px;text-align:center;min-height:42px;
  display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid rgba(246,162,28,.12)}
.stxt{font-family:'Courier New',monospace;font-size:.95rem;
  letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase}

/* pass body */
.pbody{padding:18px 18px 20px;color:var(--dk)}
.sp-lbl{font-family:'Courier New',monospace;font-size:.58rem;
  letter-spacing:.2em;color:rgba(18,33,61,.4);text-transform:uppercase;margin-bottom:6px}
.agent-box{font-size:.97rem;line-height:1.6;background:rgba(18,33,61,.06);
  border-left:3px solid var(--accent);padding:11px 14px;
  border-radius:0 6px 6px 0;margin-bottom:16px}
.hint-box{background:rgba(18,33,61,.07);border-radius:6px;
  padding:11px 14px;font-size:.9rem;line-height:1.55;margin-bottom:14px}
.hint-lbl{font-family:'Courier New',monospace;font-size:.58rem;
  letter-spacing:.18em;color:var(--accent);margin-bottom:4px}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:10px 18px;border-radius:6px;font-size:.84rem;font-weight:600;
  cursor:pointer;border:none;transition:opacity .14s,transform .1s}
.btn:active{transform:scale(.96);opacity:.82}
.btn-primary{background:var(--accent);color:#12213D}
.btn-sub{background:rgba(18,33,61,.1);color:var(--dk);
  border:1px solid rgba(18,33,61,.18)}
.btn-outline{background:none;border:1px solid rgba(246,162,28,.6);
  color:var(--accent);font-family:'Courier New',monospace;
  font-size:.72rem;letter-spacing:.08em}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row .btn{flex:1}

/* mic recording */
.mic-area{margin-top:4px}
.mic-row{display:flex;align-items:center;gap:8px;padding:10px 0;
  font-size:.82rem;color:var(--dk);opacity:.72}
.mic-dot{width:10px;height:10px;border-radius:50%;background:var(--error);
  animation:pls 1s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.72)}}
/* live transcript */
.live-transcript{min-height:2.6em;background:rgba(18,33,61,.05);border-radius:6px;
  padding:9px 12px;font-size:.9rem;line-height:1.55;color:var(--dk);margin:4px 0 8px}
.interim-text{color:rgba(18,33,61,.38);font-style:italic}
.btn-confirm{width:100%;margin-bottom:8px;font-size:.8rem;padding:8px 14px}
.fb-toggle{font-size:.68rem;color:rgba(18,33,61,.42);cursor:pointer;
  text-decoration:underline;background:none;border:none;padding:0;margin-top:2px;display:block}
.fb-area{display:none;gap:8px;margin-top:10px}
.fb-area.open{display:flex}
.fb-area input{flex:1;padding:9px 11px;border:1px solid rgba(18,33,61,.22);
  border-radius:6px;font-size:.88rem;background:#fff;color:var(--dk)}

/* result */
.rsec{margin-bottom:13px}
.rlbl{font-family:'Courier New',monospace;font-size:.58rem;
  letter-spacing:.2em;color:rgba(18,33,61,.4);text-transform:uppercase;margin-bottom:5px}
.rtxt{font-size:.88rem;line-height:1.55;color:var(--dk);
  background:rgba(18,33,61,.05);padding:10px 12px;border-radius:6px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;
  border-radius:20px;font-family:'Courier New',monospace;font-size:.75rem;
  letter-spacing:.1em;font-weight:700;margin:10px 0}
.badge.pass{background:rgba(62,142,99,.12);color:var(--success);
  border:1px solid rgba(62,142,99,.32)}
.badge.fail{background:rgba(192,70,58,.09);color:var(--error);
  border:1px solid rgba(192,70,58,.28)}
.diff-box{background:rgba(18,33,61,.06);border-radius:6px;
  padding:10px 12px;font-size:.76rem;color:rgba(18,33,61,.65);line-height:1.7}
.diff-hd{font-family:'Courier New',monospace;font-size:.56rem;
  letter-spacing:.18em;color:rgba(18,33,61,.38);margin-bottom:5px}
.diff-miss{color:var(--error)}
.diff-xtra{color:#1d61c4}

/* japanese translation hint */
.text-jp{font-size:.76rem;color:rgba(18,33,61,.45);margin-top:5px;line-height:1.5;padding:0 2px}

/* speak model button */
.btn-speak-model{background:none;border:1px solid rgba(18,33,61,.2);
  color:rgba(18,33,61,.6);font-size:.67rem;padding:4px 10px;border-radius:4px;
  cursor:pointer;vertical-align:middle;margin-left:6px;
  touch-action:manipulation;            /* kills 300ms iOS delay */
  -webkit-tap-highlight-color:rgba(246,162,28,.2);
  transition:background .12s,opacity .12s,color .12s;user-select:none}
.btn-speak-model:active,.btn-speak-model.speaking{
  background:rgba(246,162,28,.18);color:#12213D;opacity:1;
  border-color:rgba(246,162,28,.6)}

/* full conversation review */
.fc-review-item{border-bottom:1px solid rgba(18,33,61,.1);padding-bottom:16px;margin-bottom:16px}
.fc-review-item:last-child{border-bottom:none;margin-bottom:0}

/* clear screen */
.clear-sc{padding:32px 18px;text-align:center}
.clear-title{font-family:'Courier New',monospace;font-size:1.35rem;
  letter-spacing:.22em;color:var(--success);font-weight:700;text-transform:uppercase;margin-bottom:8px}
.clear-sub{font-size:.83rem;color:rgba(18,33,61,.5);margin-bottom:24px}

/* ══════════════════ HOME GEAR ══════════════════ */
.home-hd{display:flex;align-items:flex-start;justify-content:space-between;
  padding:26px 16px 18px;border-bottom:1px solid rgba(246,162,28,.18)}
.home-hd-text{}
.gear-btn{background:none;border:1px solid rgba(246,162,28,.32);
  padding:7px 8px;border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;line-height:0}
.gear-btn:active{opacity:.6}
.gear-btn svg{display:block}

/* ══════════════════ PROFILE SCREEN ══════════════════ */
.prof-w{padding:16px 16px 32px}
.prof-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.prof-title{font-family:'Courier New',monospace;font-size:.75rem;
  letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase}
.prof-form{background:var(--board);border:1px solid rgba(246,162,28,.22);
  border-radius:8px;padding:18px 16px;display:flex;flex-direction:column;gap:14px}
.prof-field{display:flex;flex-direction:column;gap:5px}
.prof-lbl{font-family:'Courier New',monospace;font-size:.58rem;
  letter-spacing:.2em;color:rgba(246,162,28,.7);text-transform:uppercase}
.prof-input{background:rgba(255,255,255,.05);border:1px solid rgba(246,162,28,.25);
  border-radius:5px;color:#fff;font-size:.9rem;padding:9px 12px;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.prof-input:focus{outline:none;border-color:rgba(246,162,28,.65)}
.prof-input[type=number]{-moz-appearance:textfield}
.prof-save{margin-top:6px;font-family:'Courier New',monospace;
  font-size:.75rem;letter-spacing:.12em;padding:12px}

/* ══════════════════ INTRO SCREEN ══════════════════ */
.intro-w{padding:12px 16px 32px}
.intro-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}

/* segment control tabs */
.tab-row{display:flex;gap:0;margin-bottom:16px;
  border:1px solid rgba(246,162,28,.35);border-radius:6px;overflow:hidden}
.tab-btn{flex:1;background:none;border:none;
  font-family:'Space Grotesk','Courier New',monospace;font-size:.62rem;letter-spacing:.14em;
  color:rgba(246,162,28,.55);padding:9px 4px;cursor:pointer;text-align:center;
  border-right:1px solid rgba(246,162,28,.2);transition:background .12s,color .12s}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:var(--accent);color:#12213D;font-weight:700}
.tab-btn:active{opacity:.7}

/* section label */
.section-lbl{font-family:'Space Grotesk','Courier New',monospace;font-size:.6rem;
  letter-spacing:.2em;color:rgba(246,162,28,.5);text-transform:uppercase;margin-bottom:12px}

/* phrase cards (cream background) */
.phrase-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.phrase-row{background:#F5F2EA;border-radius:8px;padding:13px 15px;cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.12);
  transition:transform .1s,box-shadow .1s}
.phrase-row:active{transform:scale(.98);box-shadow:0 1px 2px rgba(0,0,0,.04),0 1px 4px rgba(0,0,0,.08)}
.phrase-num{font-family:'Space Grotesk','Courier New',monospace;font-size:.56rem;
  letter-spacing:.2em;color:var(--accent);margin-bottom:5px}
.phrase-en{font-size:.9rem;color:#12213D;font-weight:600;line-height:1.5}
.phrase-jp{font-size:.72rem;color:#5C6B7A;margin-top:4px;line-height:1.45}

/* Q&A cards (cream background) */
.qa-row{background:#F5F2EA;border-radius:8px;padding:13px 15px;cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.12);
  transition:transform .1s;margin-bottom:8px}
.qa-row:active{transform:scale(.98)}
.qa-q-lbl{font-family:'Space Grotesk','Courier New',monospace;font-size:.54rem;
  letter-spacing:.2em;color:var(--accent);margin-bottom:4px}
.qa-q{font-size:.88rem;color:#12213D;font-weight:600;line-height:1.45}
.qa-a{font-size:.76rem;color:#5C6B7A;margin-top:5px;line-height:1.4}

/* full intro CTA — inherits .btn.btn-primary */
.full-intro-btn{width:100%;padding:12px;font-family:'Space Grotesk','Courier New',monospace;
  font-size:.72rem;letter-spacing:.14em;margin-top:4px}

/* intro practice shell (reuses .pass, .pbody etc.) */
.intro-pass-wrap{padding:0}

/* ══════════════════ ① PASSPORT STAMP ══════════════════ */
.stamp-overlay{position:fixed;inset:0;display:flex;align-items:center;
  justify-content:center;z-index:9999;pointer-events:none}
.stamp-svg{filter:drop-shadow(0 6px 28px rgba(176,34,14,.45));
  animation:stampDrop 150ms cubic-bezier(.05,.9,.25,1) forwards,
    stampSettle .4s ease 150ms forwards, stampFade .35s ease 1.9s forwards}
@keyframes stampDrop{
  from{transform:scale(1.4) rotate(-14deg);opacity:0}
  to{transform:scale(1.0) rotate(-12deg);opacity:1}}
@keyframes stampSettle{
  0%{transform:scale(1.0) rotate(-12deg)}
  30%{transform:scale(1.04) rotate(-13.5deg)}
  65%{transform:scale(.97) rotate(-11deg)}
  100%{transform:scale(1.0) rotate(-12deg)}}
@keyframes stampFade{from{opacity:1}to{opacity:0}}

/* ══════════════════ ② MIC VISUALIZER ══════════════════ */
.viz-wrap{display:flex;align-items:center;gap:3px;height:28px;margin-left:6px}
.viz-bar{width:5px;background:var(--accent);border-radius:3px;height:4px;
  transition:height 55ms ease-out;flex-shrink:0}

/* ══════════════════ ③⑤ HOME HEADER EXTRAS ══════════════════ */
.home-meta{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.departure-cntdwn{font-family:'Space Grotesk','Courier New',monospace;font-size:.6rem;
  letter-spacing:.2em;color:var(--accent);opacity:.8;text-transform:uppercase}
.world-clock{font-family:'Space Grotesk','Courier New',monospace;font-size:.58rem;
  letter-spacing:.12em;color:rgba(255,255,255,.38);text-transform:uppercase}
.home-hd-btns{display:flex;gap:7px;flex-shrink:0;margin-top:1px}

function progressRing(cleared, total) {
  const r = 15, cx = 22, cy = 22;
  const circ = +(2 * Math.PI * r).toFixed(2);
  const dash  = total > 0 ? +((cleared / total) * circ).toFixed(2) : 0;
  const done  = cleared === total && total > 0;
  const clr   = done ? '#3E8E63' : '#F6A21C';
  return `<svg width="44" height="44" viewBox="0 0 44 44" style="flex-shrink:0" aria-hidden="true">` +

    `stroke="rgba(18,33,61,.12)" stroke-width="2.5"/>` +
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" ` +
    `stroke="${clr}" stroke-width="2.5" stroke-linecap="round" ` +
    `stroke-dasharray="${dash} ${circ}" transform="rotate(-90 ${cx} ${cy})"/>` +
    `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" ` +
    `font-family="'Space Grotesk','Courier New',monospace" ` +
    `font-size="11" font-weight="700" fill="${clr}">${cleared}</text>` +
    `</svg>`;

function pickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return;   // not yet loaded — retry on voiceschanged
  bestVoice =
    vs.find(v => v.lang === 'en-US' && v.localService) ||
    vs.find(v => v.lang.startsWith('en-US')) ||
    vs.find(v => v.lang.startsWith('en')) || null;
}
// addEventListener is more reliable on iOS than property assignment alone
try { speechSynthesis.addEventListener('voiceschanged', pickVoice); } catch(_) {}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

// ── utterance factory ──────────────────────────────────────
function _makeUtt(text) {
  pickVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.95;
  if (bestVoice) u.voice = bestVoice;
  return u;
}

// ── speak() — game-flow TTS ────────────────────────────────
// 80 ms defer avoids same-tick speak() after previous utterance ends.
let listenTimer = null;
let _speakTimer  = null;
let _ttsEndedAt  = 0;   // timestamp when TTS ended (for mic-start guard ③)
function speak(text, onDone) {
  clearTimeout(listenTimer);
  clearTimeout(_speakTimer);
  const u = _makeUtt(text);
  const done = () => {
    clearTimeout(listenTimer);
    _ttsEndedAt = Date.now();
    if (onDone) onDone();
  };
  u.onend  = done;
  u.onerror = done;
  _speakTimer = setTimeout(() => {
    listenTimer = setTimeout(done, Math.max(text.split(' ').length * 700, 5000));
    speechSynthesis.speak(u);
  }, 80);
}

// ── speakOnly() — called directly from onclick buttons ────
// btn: the button element; used for immediate visual feedback so
// the user knows the tap registered even before audio starts.
function speakOnly(text, btn) {
  if (btn) {
    btn.classList.add('speaking');
    setTimeout(() => btn.classList.remove('speaking'), 900);
  }
  clearTimeout(listenTimer);
  clearTimeout(_speakTimer);
  const u = _makeUtt(text);
  _speakTimer = setTimeout(() => speechSynthesis.speak(u), 80);
}

// ═══════════════════════════════════════════════════════════
// SPEECH RECOGNITION  (continuous + silence-timer 2.5s)
// ═══════════════════════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null;
let silenceTimer = null;
let finalBuffer = '';
let pendingOnResult = null;
let recogDone = false;
let _recogEndedAt = 0;  // timestamp when mic session fully ended
let _recogErrors  = 0;  // consecutive error count within current mic session

function startRecog(onResult, onErr) {
  // ① permanent fallback if browser has no SR support
  if (!SR) { S.useFallback = true; if (onErr) onErr('unsupported'); return; }
  // ① already decided to fall back (2 consecutive failures this session)
  if (S.useFallback) { if (onErr) onErr('fallback'); return; }

  // ③ iOS AudioSession guard: wait 500ms after TTS ends before opening mic
  const sinceTTS = Date.now() - _ttsEndedAt;
  if (sinceTTS < 500) {
    setTimeout(() => startRecog(onResult, onErr), 500 - sinceTTS);
    return;
  }

  stopRecog();
  finalBuffer = '';
  pendingOnResult = onResult;
  recogDone = false;

  recog = new SR();
  recog.lang = 'en-US';
  recog.continuous = true;
  recog.interimResults = true;

  recog.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalBuffer += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    updateLiveTranscript(finalBuffer.trim(), interim);
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(deliverTranscript, 2500);
  };

  recog.onerror = e => {
    if (e.error === 'no-speech') { deliverTranscript(); return; }
    clearTimeout(silenceTimer);
    _recogErrors++;
    stopRecog();
    if (_recogErrors >= 2) {
      // ② 2 consecutive failures → fall back to text input
      S.useFallback = true;
      if (onErr) onErr(e.error);
    } else {
      // ② 1st failure → auto-retry once after short delay
      const area = $id('mic-area');
      if (area) area.innerHTML =
        `<div class="mic-row"><div class="mic-dot" style="opacity:.45"></div>再試行中...</div>`;
      setTimeout(() => startRecog(onResult, onErr), 800);
    }
  };

  // ブラウザが勝手に終了した場合もここで確定
  recog.onend = () => {
    S.recognizing = false;
    _recogEndedAt = Date.now();
    if (!recogDone) deliverTranscript();
  };

  try { recog.start(); S.recognizing = true; }
  catch(e) {
    _recogErrors++;
    if (_recogErrors >= 2) { S.useFallback = true; if (onErr) onErr('start'); }
    else setTimeout(() => startRecog(onResult, onErr), 800);
  }
}

// バッファを確定して判定へ渡す（二重呼び出し防止）
function deliverTranscript() {
  if (recogDone) return;
  recogDone = true;
  _recogErrors = 0;  // ② successful recognition — reset consecutive error count
  clearTimeout(silenceTimer);
  stopRecog();
  const t = finalBuffer.trim();
  finalBuffer = '';
  const cb = pendingOnResult;
  pendingOnResult = null;
  if (cb) cb(t);
}

// 「これで確定」ボタンから呼ぶ
function forceConfirm() { deliverTranscript(); }

function stopRecog() {
  clearTimeout(silenceTimer);
  if (recog) {
    const r = recog;
    recog = null;
    try { r.abort(); } catch(_) {}  // abort() forces immediate session end on iOS
    try { r.stop();  } catch(_) {}
  }
  S.recognizing = false;
}

// ライブ字幕を更新
function updateLiveTranscript(final, interim) {
  const el = $id('live-transcript');
  if (!el) return;
  el.innerHTML =
    (final ? esc(final) : '') +
    (interim ? `<em class="interim-text"> ${esc(interim)}</em>` : '');
}

// ═══════════════════════════════════════════════════════════
// SPLIT-FLAP
// ═══════════════════════════════════════════════════════════
const FLAP = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ:./ -';
function splitFlap(el, target) {
  const T = target.toUpperCase();
  const len = T.length;
  let f = 0;
  const SETTLE = 3, total = len * SETTLE + 5;
  const tick = () => {
    let out = '';
    for (let i = 0; i < len; i++) {
      if (f >= i * SETTLE + SETTLE) out += T[i];
      else out += T[i] === ' ' ? ' ' : FLAP[Math.floor(Math.random() * FLAP.length)];
    }
    el.textContent = out;
    if (++f < total) setTimeout(tick, 36);
    else el.textContent = T;
  };
  tick();
}

// ═══════════════════════════════════════════════════════════
// WORD MATCHING
// ═══════════════════════════════════════════════════════════
const norm = s => s.toLowerCase().replace(/[^a-z0-9\s']/g,'').split(/\s+/).filter(Boolean);

function matchPct(spoken, expected) {
  const exp = norm(expected);
  if (!exp.length) return 100;
  const sp = new Set(norm(spoken));
  return Math.round(exp.filter(w => sp.has(w)).length / exp.length * 100);
}

function diff(spoken, expected) {
  const expW = norm(expected), spSet = new Set(norm(spoken)), expSet = new Set(expW);
  return {
    missing: expW.filter(w => !spSet.has(w)),
    extra:   norm(spoken).filter(w => !expSet.has(w)),
  };
}

// ═══════════════════════════════════════════════════════════
// DRAG & DROP  (card reorder — mouse + touch via Pointer API)
// ═══════════════════════════════════════════════════════════
const DND = {
  active:false, dragKey:null, fromIdx:-1,
  insertSlot:-1, clone:null, line:null,
  rectSnap:[], startX:0, startY:0,
  offsetX:0, offsetY:0, pointerId:null,
};

function initCardDrag() {
  const grid = $id('cat-grid');
  if (!grid) return;
  grid.addEventListener('pointerdown',   dndDown, {passive:true});
  grid.addEventListener('pointermove',   dndMove, {passive:false});
  grid.addEventListener('pointerup',     dndUp);
  grid.addEventListener('pointercancel', dndCancel);
}

function dndDown(e) {
  const card = e.target.closest('[data-key]');
  if (!card) return;
  DND.dragKey   = card.dataset.key;
  DND.pointerId = e.pointerId;
  DND.startX    = e.clientX;
  DND.startY    = e.clientY;
  DND.active    = false;
  const r = card.getBoundingClientRect();
  DND.offsetX = e.clientX - r.left;
  DND.offsetY = e.clientY - r.top;
}

function dndMove(e) {
  if (!DND.dragKey || e.pointerId !== DND.pointerId) return;
  const dy = e.clientY - DND.startY, dx = e.clientX - DND.startX;
  if (!DND.active) {
    if (Math.abs(dy) < 6 && Math.abs(dx) < 6) return;
    dndStart(e);
  }
  e.preventDefault();
  if (DND.clone) {
    DND.clone.style.transform =
      `translate(${dx}px,${dy}px) rotate(1.2deg) scale(1.04)`;
  }
  const slot = calcInsertSlot(e.clientY);
  if (slot !== DND.insertSlot) { DND.insertSlot = slot; updateInsertLine(slot); }
}

function dndUp(e) {
  if (!DND.dragKey || e.pointerId !== DND.pointerId) return;
  if (!DND.active) {
    const key = DND.dragKey;
    dndCleanup(false);
    if (key === 'intro') goIntro(); else goScenarios(key);
    return;
  }
  dndDrop();
}

function dndStart(e) {
  DND.active  = true;
  DND.fromIdx = S.cardOrder.indexOf(DND.dragKey);
  const grid  = $id('cat-grid');
  const cards = [...grid.querySelectorAll('[data-key]')];
  DND.rectSnap = cards.map(c => ({key:c.dataset.key, rect:c.getBoundingClientRect()}));

  const orig = grid.querySelector(`[data-key="${DND.dragKey}"]`);
  if (orig) orig.classList.add('dnd-ghost');

  const r  = DND.rectSnap[DND.fromIdx] ? DND.rectSnap[DND.fromIdx].rect
           : orig ? orig.getBoundingClientRect() : {top:0, left:0, width:300};
  const cl = orig ? orig.cloneNode(true) : document.createElement('div');
  cl.removeAttribute('data-key');
  cl.classList.remove('dnd-ghost');
  cl.style.cssText =
    `position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;` +
    `z-index:9999;pointer-events:none;border-radius:8px;` +
    `box-shadow:0 12px 40px rgba(0,0,0,.55);` +
    `transform:translate(0,0) rotate(0deg) scale(1);transition:none;`;
  document.body.appendChild(cl);
  DND.clone = cl;

  const gr = grid.getBoundingClientRect();
  const ln = document.createElement('div');
  ln.style.cssText =
    `position:fixed;left:${gr.left+16}px;right:${window.innerWidth-gr.right+16}px;` +
    `height:3px;border-radius:2px;background:var(--accent);` +
    `box-shadow:0 0 10px rgba(246,162,28,.8);z-index:9998;pointer-events:none;` +
    `top:0;transition:top .08s ease`;
  document.body.appendChild(ln);
  DND.line = ln;

  DND.insertSlot = DND.fromIdx;
  updateInsertLine(DND.fromIdx);
  try { grid.setPointerCapture(DND.pointerId); } catch(_) {}
}

function calcInsertSlot(clientY) {
  const rem = DND.rectSnap.filter(r => r.key !== DND.dragKey);
  for (let i = 0; i < rem.length; i++) {
    if (clientY < rem[i].rect.top + rem[i].rect.height / 2) return i;
  }
  return rem.length;
}

function updateInsertLine(slot) {
  if (!DND.line) return;
  const rem = DND.rectSnap.filter(r => r.key !== DND.dragKey);
  let y;
  if (!rem.length)          { y = 0; }
  else if (slot <= 0)       { y = rem[0].rect.top - 8; }
  else if (slot >= rem.length) { y = rem[rem.length-1].rect.bottom + 5; }
  else { y = Math.round((rem[slot-1].rect.bottom + rem[slot].rect.top) / 2); }
  DND.line.style.top = y + 'px';
}

function dndDrop() {
  const slot     = DND.insertSlot;
  const newOrder = S.cardOrder.filter(k => k !== DND.dragKey);
  newOrder.splice(Math.max(0, Math.min(slot, newOrder.length)), 0, DND.dragKey);
  S.cardOrder = newOrder;
  dndCleanup(true);
  renderHome();
  api.put('/api/categories/order', {order: S.cardOrder}).catch(() => {});
}

function dndCancel() { dndCleanup(false); }

function dndCleanup(rerendering) {
  if (DND.clone) { DND.clone.remove(); DND.clone = null; }
  if (DND.line)  { DND.line.remove();  DND.line  = null; }
  if (!rerendering) {
    const grid = $id('cat-grid');
    if (grid) grid.querySelectorAll('.dnd-ghost').forEach(el => el.classList.remove('dnd-ghost'));
  }
  Object.assign(DND, {
    active:false, dragKey:null, fromIdx:-1,
    insertSlot:-1, rectSnap:[], pointerId:null,
  });
}

function launchMic(expected, onDone) {
  _recogErrors = 0;              // ② reset per mic session
  if (SR) S.useFallback = false; // ② allow retry each new session
  const cb = onDone || onTranscript;

  if (S.useFallback) { showFallback(area, expected, cb); return; }
  area.innerHTML = `

  startRecog(

    () => { showFallback($id('mic-area'), expected, cb); }

let _launchMicCb = null;

function showFallback(area, expected, cb) {

    <p style="font-size:.76rem;color:rgba(18,33,61,.45);margin-bottom:8px">音声認識が利用できません</p>
    <div class="fb-area open" id="fb-area">
      <input type="text" id="fb-in" placeholder="Type English here...">
      <button class="btn btn-sub" onclick="submitFB(${JSON.stringify(expected)})">送信</button>
    </div>`;
  $id('fb-in')?.focus();
  _launchMicCb = cb;
}

function toggleFB() {
  const a = $id('fb-area');
  if (!a) return;
  a.classList.toggle('open');
  if (a.classList.contains('open')) { stopRecog(); $id('fb-in')?.focus(); }
}

function submitFB(expected) {
  const v = ($id('fb-in')?.value||'').trim();
  if (!v) return;
  recogDone = true;
  pendingOnResult = null;
  stopRecog();
  const cb = _launchMicCb || onTranscript;
  cb(v, expected);
}

// ─── RESULT ───────────────────────────────────────────────
function onTranscript(transcript, expected) {
  stopRecog();
  S.phase = 'result';
  S.transcript = transcript;
  setStatus('RESULT');

  const textJp = curTurn().text_jp || '';
  const pct  = matchPct(transcript, expected);
  const pass = pct >= 60;
  const { missing, extra } = diff(transcript, expected);
  const isLast = S.turnIdx === 3;

  const missLine = missing.length
    ? `<div class="diff-miss">・言えなかった単語: <strong>${missing.join(', ')}</strong></div>`
    : `<div>・言えなかった単語: なし 👍</div>`;
  const xtraLine = extra.length
    ? `<div class="diff-xtra">・余分な単語: <strong>${extra.join(', ')}</strong></div>`
    : `<div>・余分な単語: なし</div>`;

  setBody(`
    <div class="rsec">
      <div class="rlbl mono">あなたの発話</div>
      <div class="rtxt">${transcript ? esc(transcript)
        : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
    </div>
    <div class="rsec">
      <div style="display:flex;align-items:center;margin-bottom:5px">
        <div class="rlbl mono" style="margin-bottom:0">模範解答</div>
        <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(expected)},this)">🔊 正しい発音を聞く</button>
      </div>
      <div class="rtxt">${esc(expected)}</div>
      ${textJp ? `<div class="text-jp">${esc(textJp)}</div>` : ''}
    </div>
    <div class="badge ${pass?'pass':'fail'}">
      ${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}% 一致
    </div>
    <div class="diff-box">
      <div class="diff-hd mono">違いのチェック</div>
      ${missLine}${xtraLine}
    </div>
    <div class="btn-row">
      <button class="btn btn-sub" onclick="retryTurn()">もう一度</button>
      <button class="btn btn-primary" onclick="nextTurn()">${isLast?'完了 →':'次へ →'}</button>
    </div>
  `);
}

function retryTurn() { speechSynthesis.cancel(); stopRecog(); startTurn(S.turnIdx); }

function nextTurn() {
  speechSynthesis.cancel();
  stopRecog();
  const next = S.turnIdx + 1;
  if (next < 4) { setProgress(next); startTurn(next); }
  else phStartFullConv();   // ステップ練習完了 → 通し会話へ
}

// ─── FULL CONVERSATION ────────────────────────────────────
function phStartFullConv() {
  S.phase = 'fc-intro';
  setStatus('FULL CONVERSATION');
  setProgress(4);
  setBody(`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:1.6rem;margin-bottom:10px">🎤</div>
      <div style="font-family:'Courier New',monospace;font-size:.75rem;letter-spacing:.18em;
        color:var(--accent);font-weight:700;margin-bottom:12px">FULL CONVERSATION</div>
      <p style="font-size:.86rem;color:rgba(18,33,61,.7);line-height:1.65;margin-bottom:20px">
        4ターンを通して会話してみましょう。<br>ヒントも模範解答も表示しません。<br>終わったら振り返りを確認できます。
      </p>
      <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="startFullConv()">通し練習を始める →</button>
      <button class="reset-btn" onclick="phClear()">スキップしてクリア</button>
    </div>
  `);
}

function startFullConv() {
  S.fullConv = true;
  S.fullConvLogs = [];
  fcTurn(0);
}

function setFCProgress(idx) {
  const f = $id('prog-fill'); if (f) f.style.width = Math.round((idx+1)/4*100)+'%';
  const l = $id('turn-lbl'); if (l) l.textContent = `FULL CONV ${idx+1} / 4`;
}

function fcTurn(idx) {
  S.turnIdx = idx;
  setFCProgress(idx);
  const turn = S.scenario.turns[idx];
  if (turn.speaker === 'agent') {
    setStatus('FULL CONV');
    setBody(`
      <div class="sp-lbl mono">STAFF / PARTNER</div>
      <div class="agent-box">${esc(turn.text)}</div>
      ${turn.text_jp ? `<div class="text-jp">${esc(turn.text_jp)}</div>` : ''}
      <div style="font-size:.73rem;color:rgba(18,33,61,.4);margin-top:6px">次のターンへ進んでいます...</div>
    `);
    speak(turn.text, () => {
      if (!S.fullConv) return;
      if (idx + 1 < 4) fcTurn(idx + 1); else fcReview();
    });
  } else {
    setStatus('YOUR TURN');
    setBody(`
      <div class="sp-lbl mono">YOUR TURN</div>
      <div class="hint-box">
        <div class="hint-lbl mono">HINT</div>
        ${esc(turn.hint||'')}
      </div>
      ${micHtml()}
    `);
    setTimeout(() => launchMicFC(turn.text, idx), 400);
  }
}

function launchMicFC(expected, idx) {
  _recogErrors = 0;              // ② reset per mic session
  if (SR) S.useFallback = false; // ② allow retry each new session
  const area = $id('mic-area');
  if (!area) return;
  if (S.useFallback) {
    area.innerHTML = `
      <p style="font-size:.76rem;color:rgba(18,33,61,.45);margin-bottom:8px">音声認識が利用できません</p>
      <div class="fb-area open">
        <input type="text" id="fb-in" placeholder="Type English here...">
        <button class="btn btn-sub" onclick="fcSubmitFB(${JSON.stringify(expected)},${idx})">送信</button>
      </div>`;
    $id('fb-in')?.focus();
    return;
  }
  area.innerHTML = `
    <div class="mic-row"><div class="mic-dot"></div>録音中... （2.5秒の無音で自動確定）</div>
    <div class="live-transcript" id="live-transcript"></div>
    <button class="btn btn-primary btn-confirm" onclick="forceConfirm()">✓ これで確定</button>
  `;
  startRecog(
    t => onFC(t, expected, idx),
    () => onFC('', expected, idx)
  );
}

function fcSubmitFB(expected, idx) {
  const v = ($id('fb-in')?.value||'').trim();
  recogDone = true; pendingOnResult = null;
  stopRecog();
  onFC(v, expected, idx);
}

function onFC(transcript, expected, idx) {
  stopRecog();
  const text_jp = S.scenario.turns[idx].text_jp || '';
  S.fullConvLogs.push({ turnNum: idx + 1, transcript, expected, text_jp });
  const next = idx + 1;
  if (next < 4) fcTurn(next); else fcReview();
}

function fcReview() {
  S.fullConv = false;
  setStatus('FC REVIEW');
  const l = $id('turn-lbl'); if (l) l.textContent = 'FULL CONV · DONE';
  const f = $id('prog-fill'); if (f) f.style.width = '100%';

  const items = S.fullConvLogs.map(log => {
    const pct = matchPct(log.transcript, log.expected);
    const pass = pct >= 60;
    const { missing, extra } = diff(log.transcript, log.expected);
    const missLine = missing.length
      ? `<div class="diff-miss">・言えなかった単語: <strong>${missing.join(', ')}</strong></div>`
      : `<div>・言えなかった単語: なし 👍</div>`;
    const xtraLine = extra.length
      ? `<div class="diff-xtra">・余分な単語: <strong>${extra.join(', ')}</strong></div>`
      : `<div>・余分な単語: なし</div>`;
    return `
      <div class="fc-review-item">
        <div class="rlbl mono">TURN ${log.turnNum} — あなたの発話</div>
        <div class="rtxt">${log.transcript ? esc(log.transcript) : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
        <div style="display:flex;align-items:center;margin:8px 0 5px">
          <div class="rlbl mono" style="margin-bottom:0">模範解答</div>
          <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(log.expected)},this)">🔊 発音を聞く</button>
        </div>
        <div class="rtxt" style="margin-bottom:6px">${esc(log.expected)}</div>
        ${log.text_jp ? `<div class="text-jp" style="margin-bottom:6px">${esc(log.text_jp)}</div>` : ''}
        <div class="badge ${pass?'pass':'fail'}">${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}% 一致</div>
        <div class="diff-box">
          <div class="diff-hd mono">違いのチェック</div>
          ${missLine}${xtraLine}
        </div>
      </div>`;
  }).join('');

  setBody(`
    <div style="font-family:'Courier New',monospace;font-size:.68rem;letter-spacing:.16em;
      color:var(--accent);margin-bottom:16px;font-weight:700">FULL CONVERSATION · REVIEW</div>
    ${items}
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="phClear()">クリア！ →</button>
  `);
}

// ─── SCENARIO CLEAR ──────────────────────────────────────
async function phClear() {
  S.phase = 'clear';
  setStatus('SCENARIO CLEAR');
  setProgress(4);
  try { await api.post(`/api/scenarios/${S.scenario.id}/clear`); } catch(_) {}
  setBody(`
    <div class="clear-sc">
      <div class="clear-title mono">SCENARIO CLEAR</div>
      <div class="clear-sub">${esc(S.scenario.title_jp)} をクリアしました！</div>
      <button class="btn btn-primary" onclick="backToList()">← 一覧に戻る</button>
    </div>`);
  showStamp();
}

function curTurn() { return S.scenario.turns[S.turnIdx]; }

// INTRO HELPER — build phrases from profile
// ═══════════════════════════════════════════════════════════
function buildIntroData(p) {
  const formalPhrases = [
    { text: `Good morning everyone. I'm ${p.name_en}, joining you from the ${p.base_en} office.`,
      text_jp: `おはようございます。${p.base_en}オフィスから参りました、${p.name_en}です。` },
    { text: `I work as ${p.role_en}, focusing on ${p.focus_en}.`,
      text_jp: `私は${p.role_jp}として、${p.focus_jp}を担当しています。` },
    { text: `This is my first time visiting the Munich office.`,
      text_jp: `ミュンヘンオフィスへの訪問は今回が初めてです。` },
    { text: `I'm here this week for ${p.purpose_en}.`,
      text_jp: `今週は${p.purpose_jp}のためにこちらに来ています。` },
    { text: `I'm looking forward to learning how your team works here.`,
      text_jp: `こちらのチームの働き方をぜひ学ばせてください。` },
    { text: `Please feel free to reach out to me anytime during my stay.`,
      text_jp: `滞在中はいつでも気軽に声をかけてください。` },
    { text: `Thank you, and I'm excited to work with you all.`,
      text_jp: `ありがとうございます。皆さんと一緒に仕事できることを楽しみにしています。` },
  ];
  const casualPhrases = [
    { text: `Hi, I'm ${p.name_en}, from the ${p.base_en} office.`,
      text_jp: `こんにちは、${p.base_en}オフィスの${p.name_en}です。` },
    { text: `I live in Setagaya, a residential area in Tokyo.`,
      text_jp: `東京の住宅街、世田谷に住んでいます。` },
    { text: `I'm originally from ${p.origin_en}, and I went to ${p.university_en}.`,
      text_jp: `出身は${p.origin_en}で、${p.university_en}に通っていました。` },
    { text: `Outside of work, I enjoy ${p.hobbies_en}.`,
      text_jp: `仕事以外では、${p.hobbies_en}を楽しんでいます。` },
    { text: `Shogi is a Japanese board game, a bit like chess.`,
      text_jp: `将棋は日本のボードゲームで、チェスに少し似ています。` },
    { text: `This is my first time in Munich, so any recommendations are welcome.`,
      text_jp: `ミュンヘンは初めてなので、おすすめがあればぜひ教えてください。` },
    { text: `It's really nice to meet you all in person.`,
      text_jp: `皆さんに直接お会いできて、本当に嬉しいです。` },
  ];
  const qaItems = [
    { q: `What is shogi exactly?`,
      a: `It's similar to chess, but captured pieces can return to the board, so the game stays complex until the very end.`,
      q_jp: `将棋って具体的にどんなゲームですか？`,
      a_jp: `チェスに似ていますが、取った駒を自分のものとして使えるので、最後まで複雑な展開が続きます。` },
    { q: `How long have you been playing tennis?`,
      a: `For many years now. I usually play on weekends, it's a good way to refresh.`,
      q_jp: `テニスはどのくらいやっているんですか？`,
      a_jp: `もう長年やっています。週末に主にプレーしていて、リフレッシュに最適です。` },
    { q: `What's Setagaya like?`,
      a: `It's a quiet residential area in western Tokyo, with lots of parks and small local shops.`,
      q_jp: `世田谷ってどんなところですか？`,
      a_jp: `東京の西側にある静かな住宅街で、公園や小さな地元のお店がたくさんあります。` },
    { q: `What's Kyoto like? You studied there, right?`,
      a: `Yes, I spent my university years there. It's full of temples and history, I really recommend visiting.`,
      q_jp: `京都ってどんなところですか？そこで勉強されたんですよね？`,
      a_jp: `はい、大学時代を過ごしました。お寺や歴史にあふれていて、ぜひ訪れてほしいです。` },
    { q: `What will you be working on at the hackathon?`,

      q_jp: `ハッカソンでは何に取り組むんですか？`,

  return { formalPhrases, casualPhrases, qaItems };
}

function renderIntro() {
  const p = S.profile;

  let listHtml = '';
  if (sec === 'C') {
    listHtml = phrases.map((item, i) => `
      <div class="qa-row" onclick="startQA(${i})">
        <div class="qa-q-lbl mono">Q${i+1}</div>
        <div class="qa-q">${esc(item.q)}</div>
        <div class="qa-a">${esc(item.a)}</div>
      </div>`).join('');
  } else {
    listHtml = `<div class="phrase-list">` +
      phrases.map((item, i) => `
      <div class="phrase-row" onclick="startPhrase(${i})">
        <div class="phrase-num mono">PHRASE ${i+1}</div>
        <div class="phrase-en">${esc(item.text)}</div>
        <div class="phrase-jp">${esc(item.text_jp)}</div>

      `</div>
      <button class="btn btn-primary full-intro-btn" onclick="startFullIntro()">

  }

  $app.innerHTML = `
  <div class="intro-w">

      <button class="btn-back" onclick="goHome()">← HOME</button>
      <div class="bw-title">MY INTRODUCTION</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn${sec==='A'?' active':''}" onclick="switchIntroSection('A')">A · FORMAL</button>
      <button class="tab-btn${sec==='B'?' active':''}" onclick="switchIntroSection('B')">B · CASUAL</button>

    </div>

  </div>`;
  applyStagger('.phrase-row, .qa-row');
}

function switchIntroSection(sec) {
  S.introSection = sec;
  stop();
  renderIntro();
}

// ─── PHRASE STEP PRACTICE ────────────────────────────────
function startPhrase(idx) {

  S.introPhraseIdx = idx;

function intReplayTTS() {

function intPhShadow() {
  const phrase = S.introPhrases[S.introPhraseIdx];
  S.introPhase = 'shadow';
  setStatus('YOUR TURN: SHADOW');
  setBody(`
    <div class="sp-lbl mono">SHADOW THIS</div>
    <div class="agent-box">${esc(phrase.text)}</div>

// ② MIC WAVEFORM VISUALIZER
// ═══════════════════════════════════════════════════════════
let _vizStream = null, _vizRaf = null, _vizAnalyser = null;

async function startViz() {
  stopViz();
  try {
    _vizStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const src = actx.createMediaStreamSource(_vizStream);
    _vizAnalyser = actx.createAnalyser();
    _vizAnalyser.fftSize = 64;
    src.connect(_vizAnalyser);
    const data = new Uint8Array(_vizAnalyser.frequencyBinCount);
    function tick() {
      _vizRaf = requestAnimationFrame(tick);
      _vizAnalyser.getByteFrequencyData(data);
      document.querySelectorAll('.viz-bar').forEach((bar, i) => {
        const idx = Math.floor(i * 6);
        const h = Math.max(3, Math.round((data[idx] / 255) * 26));
        bar.style.height = h + 'px';
      });
    }
    tick();
  } catch(_) { /* no mic permission — fallback to text only */ }
}

function stopViz() {
  if (_vizRaf) { cancelAnimationFrame(_vizRaf); _vizRaf = null; }
  if (_vizStream) { _vizStream.getTracks().forEach(t => t.stop()); _vizStream = null; }
  _vizAnalyser = null;
}

function daysUntilDeparture() {
  const dep = new Date('2026-08-03T00:00:00+09:00');
  const now = new Date();
  const d = Math.ceil((dep - now) / 86400000);
  if (d > 0) return `DEPARTURE IN ${d} DAYS`;
  if (d === 0) return 'DEPARTURE TODAY ✈';
  return `DEPARTED ${Math.abs(d)} DAYS AGO`;
}

function showSplash() {
  return new Promise(resolve => {
    const first   = !sessionStorage.getItem('splashed');
    const holdMs  = first ? 2200 : 900;
    sessionStorage.setItem('splashed', '1');

    const splash = document.createElement('div');
    splash.id = 'splash';
    const titleEl = document.createElement('div');
    titleEl.className = 'splash-title';
    splash.innerHTML = `<div class="splash-plane">${ICON.travel}</div>`;
    splash.appendChild(titleEl);
    splash.innerHTML += `<div class="splash-sub">GATE ENGLISH</div>`;
    // re-append titleEl after innerHTML reset
    splash.insertBefore(titleEl, splash.querySelector('.splash-sub'));
    document.body.appendChild(splash);

    // split-flap character animation
    const TEXT   = 'MUNICH TRIP';
    const CHARS  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ·0123456789';
    const spans  = [];
    for (let i = 0; i < TEXT.length; i++) {
      const sp = document.createElement('span');
      sp.className = 'flap-char flap-unsettled';
      sp.textContent = TEXT[i] === ' ' ? ' ' : CHARS[Math.floor(Math.random()*CHARS.length)];
      titleEl.appendChild(sp);
      spans.push(sp);
    }

    const flipsPerChar = first ? 7 : 3;
    TEXT.split('').forEach((ch, i) => {
      if (ch === ' ') { spans[i].textContent = ' '; spans[i].classList.remove('flap-unsettled'); return; }
      let count = 0;
      const total = flipsPerChar + i;
      const iv = setInterval(() => {
        count++;
        if (count >= total) {
          clearInterval(iv);
          spans[i].textContent = ch;
          spans[i].classList.remove('flap-unsettled');
        } else {
          spans[i].textContent = CHARS[Math.floor(Math.random()*CHARS.length)];
        }
      }, first ? 65 : 35);
    });

    setTimeout(() => {
      splash.style.opacity = '0';
      setTimeout(() => { splash.remove(); resolve(); }, 420);
    }, holdMs - 420);
  });
}

    api.get('/api/profile'),
    api.get('/api/categories/order'),
  ]);
  await splashDone;
  renderHome();
})();
</script>
