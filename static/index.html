<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GATE ENGLISH · MUNICH TRIP</title>
<style>
:root {
  color-scheme: dark;
  --bg:      #12213D;
  --accent:  #F6A21C;
  --card:    #F5F2EA;
  --success: #3E8E63;
  --error:   #C0463A;
  --dk:      #12213D;
  --board:   #060d18;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased}
#app{min-height:100dvh;max-width:448px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom,16px)}

/* ── typography ── */
.mono{font-family:'Courier New','Lucida Console',monospace}

/* ── common header ── */
.app-hd{padding:24px 16px 16px;border-bottom:1px solid rgba(246,162,28,.22)}
.app-hd h1{font-family:'Courier New',monospace;font-size:.82rem;
  letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase}
.app-hd .sub{font-size:.68rem;color:rgba(255,255,255,.38);margin-top:4px;letter-spacing:.07em}

/* ── spinner ── */
.spinner{width:28px;height:28px;border:2px solid rgba(246,162,28,.18);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════ HOME ══════════════════ */

.cat-card{background:var(--card);border-radius:8px;padding:18px 18px 18px 22px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .1s,box-shadow .1s}
.cat-card:active{transform:scale(.975)}
.cat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:var(--accent)}
.cat-icon{font-size:1.9rem;line-height:1;flex-shrink:0}
.cat-body{flex:1;min-width:0}
.cat-lbl{font-family:'Courier New',monospace;font-size:.7rem;
  letter-spacing:.2em;color:var(--accent);font-weight:700;text-transform:uppercase}
.cat-jp{font-size:.95rem;color:var(--dk);font-weight:600;margin-top:2px}
.cat-score{font-family:'Courier New',monospace;font-size:1.05rem;
  font-weight:700;color:var(--dk);flex-shrink:0;text-align:right}
.cat-score .denom{font-size:.72rem;opacity:.5}
.cat-score.done{color:var(--success)}
.reset-btn{display:block;text-align:center;font-size:.68rem;
  color:rgba(255,255,255,.28);background:none;border:none;
  text-decoration:underline;cursor:pointer;margin:8px auto 20px}

/* ══════════════════ DEPARTURE BOARD ══════════════════ */
.bw{padding:16px}
.bw-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.btn-back{background:none;border:1px solid rgba(246,162,28,.38);
  color:var(--accent);font-family:'Courier New',monospace;
  font-size:.7rem;letter-spacing:.1em;padding:6px 12px;border-radius:4px;cursor:pointer}
.bw-title{font-family:'Courier New',monospace;font-size:.75rem;
  letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase}

.dboard{background:var(--board);border:1px solid rgba(246,162,28,.28);border-radius:6px;overflow:hidden}
.dboard-hd{display:grid;grid-template-columns:1fr 82px;
  padding:7px 14px;background:rgba(246,162,28,.1);
  border-bottom:1px solid rgba(246,162,28,.22)}
.dboard-hd span{font-family:'Courier New',monospace;font-size:.6rem;
  letter-spacing:.22em;color:rgba(246,162,28,.65);text-transform:uppercase}
.drow{display:grid;grid-template-columns:1fr 82px;
  padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;transition:background .1s;align-items:center}
.drow:last-child{border-bottom:none}
.drow:active{background:rgba(255,255,255,.07)}
.drow-en{font-family:'Courier New',monospace;font-size:.68rem;
  letter-spacing:.1em;color:#fff;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drow-jp{font-size:.67rem;color:rgba(255,255,255,.38);margin-top:2px}
.dstatus{font-family:'Courier New',monospace;font-size:.65rem;

.dstatus.ready{color:var(--accent)}

.pw-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}

/* boarding pass card */
.pass{background:var(--card);border-radius:10px;overflow:hidden;

.pass-hd{background:var(--dk);padding:16px 18px 14px;

.pass-en{font-family:'Courier New',monospace;font-size:.88rem;

.pass-jp{font-size:.78rem;color:rgba(255,255,255,.55);margin-top:3px}
.pass-meta{display:flex;align-items:center;gap:10px;margin-top:10px}

/* buttons */

/* result */

/* japanese translation hint */

/* speak model button */

/* ══════════════════ HOME GEAR ══════════════════ */
.home-hd{display:flex;align-items:flex-start;justify-content:space-between;
  padding:24px 16px 16px;border-bottom:1px solid rgba(246,162,28,.22)}
.home-hd-text{}
.gear-btn{background:none;border:1px solid rgba(246,162,28,.32);
  color:rgba(246,162,28,.7);font-size:.9rem;padding:6px 9px;border-radius:5px;
  cursor:pointer;flex-shrink:0;margin-top:2px;line-height:1}
.gear-btn:active{opacity:.65}

/* ══════════════════ PROFILE SCREEN ══════════════════ */

.prof-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.prof-title{font-family:'Courier New',monospace;font-size:.75rem;

.prof-lbl{font-family:'Courier New',monospace;font-size:.58rem;

.prof-input{background:rgba(255,255,255,.05);border:1px solid rgba(246,162,28,.25);

.prof-save{margin-top:6px;font-family:'Courier New',monospace;

/* ══════════════════ INTRO SCREEN ══════════════════ */
.intro-w{padding:12px 16px 32px}
.intro-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tab-row{display:flex;gap:0;margin-bottom:16px;
  border:1px solid rgba(246,162,28,.3);border-radius:6px;overflow:hidden}
.tab-btn{flex:1;background:none;border:none;
  font-family:'Courier New',monospace;font-size:.62rem;letter-spacing:.14em;
  color:rgba(246,162,28,.55);padding:9px 4px;cursor:pointer;text-align:center;
  border-right:1px solid rgba(246,162,28,.2);transition:background .12s}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:rgba(246,162,28,.15);color:var(--accent);font-weight:700}

.phrase-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.phrase-row{background:var(--board);border:1px solid rgba(246,162,28,.18);
  border-radius:6px;padding:12px 14px;cursor:pointer;transition:background .1s}

.qa-row{background:var(--board);border:1px solid rgba(246,162,28,.18);
  border-radius:6px;padding:12px 14px;cursor:pointer;transition:background .1s;margin-bottom:8px}

  letter-spacing:.16em;color:rgba(246,162,28,.6);margin-bottom:3px}

<body>
<div id="app"><div class="spinner"></div></div>
<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  screen: 'home',
  categories: [],
  selectedCat: null,
  scenarios: [],
  scenario: null,
  turnIdx: 0,
  phase: '',
  transcript: '',
  recognizing: false,
  useFallback: false,
  fullConv: false,
  fullConvLogs: [],
  // profile
  profile: null,
  // intro
  introSection: 'A',   // 'A','B','C'
  introPhrases: [],    // current section's [{text,text_jp}] or [{q,a,q_jp,a_jp}]
  introPhraseIdx: 0,
  introPhase: '',      // 'listen','shadow','qa-listen','qa-answer','qa-result','full-intro'
  introFullIdx: 0,
  introFullLogs: [],
};

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
const api = {
  get:  url => fetch(url).then(r => r.json()),
  post: url => fetch(url, { method: 'POST' }).then(r => r.json()),
  put:  (url, body) => fetch(url, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
};

// ═══════════════════════════════════════════════════════════
// SPEECH SYNTHESIS
// ═══════════════════════════════════════════════════════════
let bestVoice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  bestVoice =
    vs.find(v => v.lang === 'en-US' && v.localService) ||
    vs.find(v => v.lang.startsWith('en-US')) ||
    vs.find(v => v.lang.startsWith('en')) || null;
}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

let listenTimer = null;
function speak(text, onDone) {
  speechSynthesis.cancel();
  clearTimeout(listenTimer);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.95;
  pickVoice();
  if (bestVoice) u.voice = bestVoice;
  const done = () => { clearTimeout(listenTimer); if (onDone) onDone(); };
  u.onend = done;
  u.onerror = done;
  // fallback: auto-advance if onend never fires
  listenTimer = setTimeout(done, Math.max(text.split(' ').length * 700, 5000));
  speechSynthesis.speak(u);
}

// TTS のみ（コールバック不要・結果画面などで使う）
function speakOnly(text) {
  speechSynthesis.cancel();
  clearTimeout(listenTimer);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.95;
  pickVoice(); if (bestVoice) u.voice = bestVoice;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════════════
// SPEECH RECOGNITION  (continuous + silence-timer 2.5s)
// ═══════════════════════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null;
let silenceTimer = null;
let finalBuffer = '';
let pendingOnResult = null;
let recogDone = false;

function startRecog(onResult, onErr) {
  if (!SR || S.useFallback) { S.useFallback = true; if (onErr) onErr('unsupported'); return; }
  stopRecog();
  finalBuffer = '';
  pendingOnResult = onResult;
  recogDone = false;

  recog = new SR();
  recog.lang = 'en-US';
  recog.continuous = true;       // ← 途中確定しない
  recog.interimResults = true;   // ← リアルタイム表示用

  recog.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalBuffer += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    updateLiveTranscript(finalBuffer.trim(), interim);
    // 最後の音声から 2.5 秒無音で確定
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(deliverTranscript, 2500);
  };

  recog.onerror = e => {
    if (e.error === 'no-speech') { deliverTranscript(); return; }
    clearTimeout(silenceTimer);
    S.useFallback = true;
    stopRecog();
    if (onErr) onErr(e.error);
  };

  // ブラウザが勝手に終了した場合もここで確定
  recog.onend = () => {
    S.recognizing = false;
    if (!recogDone) deliverTranscript();
  };

  try { recog.start(); S.recognizing = true; }
  catch(e) { S.useFallback = true; if (onErr) onErr('start'); }
}

// バッファを確定して判定へ渡す（二重呼び出し防止）
function deliverTranscript() {
  if (recogDone) return;
  recogDone = true;
  clearTimeout(silenceTimer);
  stopRecog();
  const t = finalBuffer.trim();
  finalBuffer = '';
  const cb = pendingOnResult;
  pendingOnResult = null;
  if (cb) cb(t);
}

// 「これで確定」ボタンから呼ぶ
function forceConfirm() { deliverTranscript(); }

function stopRecog() {
  clearTimeout(silenceTimer);
  if (recog) { try { recog.stop(); } catch(_){} recog = null; }
  S.recognizing = false;
}

// ライブ字幕を更新
function updateLiveTranscript(final, interim) {
  const el = $id('live-transcript');
  if (!el) return;
  el.innerHTML =
    (final ? esc(final) : '') +
    (interim ? `<em class="interim-text"> ${esc(interim)}</em>` : '');
}

// ═══════════════════════════════════════════════════════════
// SPLIT-FLAP
// ═══════════════════════════════════════════════════════════
const FLAP = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ:./ -';
function splitFlap(el, target) {
  const T = target.toUpperCase();
  const len = T.length;
  let f = 0;
  const SETTLE = 3, total = len * SETTLE + 5;
  const tick = () => {
    let out = '';
    for (let i = 0; i < len; i++) {
      if (f >= i * SETTLE + SETTLE) out += T[i];
      else out += T[i] === ' ' ? ' ' : FLAP[Math.floor(Math.random() * FLAP.length)];
    }
    el.textContent = out;
    if (++f < total) setTimeout(tick, 36);
    else el.textContent = T;
  };
  tick();
}

// ═══════════════════════════════════════════════════════════
// WORD MATCHING
// ═══════════════════════════════════════════════════════════
const norm = s => s.toLowerCase().replace(/[^a-z0-9\s']/g,'').split(/\s+/).filter(Boolean);

function matchPct(spoken, expected) {
  const exp = norm(expected);
  if (!exp.length) return 100;
  const sp = new Set(norm(spoken));
  return Math.round(exp.filter(w => sp.has(w)).length / exp.length * 100);
}

function diff(spoken, expected) {
  const expW = norm(expected), spSet = new Set(norm(spoken)), expSet = new Set(expW);
  return {
    missing: expW.filter(w => !spSet.has(w)),
    extra:   norm(spoken).filter(w => !expSet.has(w)),
  };
}

// ═══════════════════════════════════════════════════════════
// RENDER SHORTCUTS
// ═══════════════════════════════════════════════════════════
const $app  = document.getElementById('app');
const $id   = id => document.getElementById(id);
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setStatus(lbl) { const el = $id('stxt'); if (el) splitFlap(el, lbl); }
function setProgress(done) {
  const f = $id('prog-fill'); if (f) f.style.width = Math.round(done/4*100)+'%';
  const l = $id('turn-lbl'); if (l) l.textContent = `TURN ${Math.min(done+1,4)} / 4`;
}
function setBody(html) { const b=$id('pbody'); if (b) b.innerHTML = html; }

// ═══════════════════════════════════════════════════════════
// TURN LOGIC
// ═══════════════════════════════════════════════════════════
function startTurn(idx) {
  S.turnIdx = idx;
  S.transcript = '';
  const turn = S.scenario.turns[idx];
  if (turn.speaker === 'agent') phListen(turn);
  else phReady(turn);
}

// ─── LISTEN (agent TTS) ───────────────────────────────────
function phListen(turn) {
  S.phase = 'listen';
  setStatus('LISTEN');
  setBody(`
    <div class="sp-lbl mono">STAFF / PARTNER</div>
    <div class="agent-box" id="agent-box">${esc(turn.text)}</div>
    ${turn.text_jp ? `<div class="text-jp">${esc(turn.text_jp)}</div>` : ''}
    <button class="btn btn-outline" onclick="replayTTS()">🔊&nbsp; もう一度聞く</button>
    <button class="btn btn-sub" style="margin-left:8px;font-size:.75rem" onclick="phRepeat(curTurn())">スキップ →</button>
  `);
  speak(turn.text, () => { if (S.phase==='listen') phRepeat(turn); });
}

function replayTTS() {
  const t = curTurn();
  speak(t.text, () => { if (S.phase==='listen') phRepeat(t); });
}

// ─── REPEAT (shadowing) ───────────────────────────────────
function phRepeat(turn) {
  S.phase = 'repeat';
  setStatus('YOUR TURN: REPEAT');
  setBody(`
    <div class="sp-lbl mono">SHADOW THIS</div>
    <div class="agent-box">${esc(turn.text)}</div>
    ${micHtml()}
  `);
  setTimeout(() => launchMic(turn.text), 400);
}

// ─── GET READY (user turn hint) ──────────────────────────
function phReady(turn) {
  S.phase = 'ready';
  setStatus('GET READY');
  setBody(`
    <div class="sp-lbl mono">YOUR TURN</div>
    <div class="hint-box">
      <div class="hint-lbl mono">この内容を英語で</div>
      ${esc(turn.text_jp||'')}
    </div>
    <p style="font-size:.78rem;color:rgba(18,33,61,.5);margin-bottom:14px">
      上の日本語を英語で言ってみてください
    </p>
    <button class="btn btn-primary" onclick="phAnswer()">準備ができたら → 話す</button>
  `);
}

// ─── ANSWER (user speaks) ─────────────────────────────────
function phAnswer() {
  const turn = curTurn();
  S.phase = 'answer';
  setStatus('YOUR TURN: ANSWER');
  setBody(`
    <div class="sp-lbl mono">YOUR TURN</div>
    <div class="hint-box">
      <div class="hint-lbl mono">この内容を英語で</div>
      ${esc(turn.text_jp||'')}
    </div>
    ${micHtml()}
  `);
  setTimeout(() => launchMic(turn.text), 400);
}

// ─── MIC HELPERS ─────────────────────────────────────────
function micHtml() {
  return `<div class="mic-area" id="mic-area">
    <div class="mic-row"><div class="mic-dot"></div>マイクを起動中...</div>
  </div>`;
}

// onDone(transcript, expected) — defaults to onTranscript for scenario practice
function launchMic(expected, onDone) {
  const cb = onDone || onTranscript;
  _launchMicCb = cb;
  const area = $id('mic-area');
  if (!area) return;
  if (S.useFallback) { showFallback(area, expected, cb); return; }
  area.innerHTML = `
    <div class="mic-row"><div class="mic-dot"></div>録音中... 英語で話してください（2.5秒の無音で自動確定）</div>
    <div class="live-transcript" id="live-transcript"></div>
    <button class="btn btn-primary btn-confirm" onclick="forceConfirm()">✓ これで確定</button>
    <button class="fb-toggle" onclick="toggleFB()">うまく聞き取れない時はテキスト入力</button>
    <div class="fb-area" id="fb-area">
      <input type="text" id="fb-in" placeholder="Type English here...">
      <button class="btn btn-sub" onclick="submitFB(${JSON.stringify(expected)})">送信</button>
    </div>`;
  startRecog(
    t => cb(t, expected),
    () => { showFallback($id('mic-area'), expected, cb); }
  );
}
let _launchMicCb = null;

function showFallback(area, expected, cb) {
  cb = cb || _launchMicCb || onTranscript;
  if (!area) return;
  area.innerHTML = `
    <p style="font-size:.76rem;color:rgba(18,33,61,.45);margin-bottom:8px">音声認識が利用できません</p>
    <div class="fb-area open" id="fb-area">
      <input type="text" id="fb-in" placeholder="Type English here...">
      <button class="btn btn-sub" onclick="submitFB(${JSON.stringify(expected)})">送信</button>
    </div>`;
  $id('fb-in')?.focus();
  _launchMicCb = cb;
}

function toggleFB() {
  const a = $id('fb-area');
  if (!a) return;
  a.classList.toggle('open');
  if (a.classList.contains('open')) { stopRecog(); $id('fb-in')?.focus(); }
}

function submitFB(expected) {
  const v = ($id('fb-in')?.value||'').trim();
  if (!v) return;
  recogDone = true;
  pendingOnResult = null;
  stopRecog();
  const cb = _launchMicCb || onTranscript;
  cb(v, expected);
}

// ─── RESULT ───────────────────────────────────────────────
function onTranscript(transcript, expected) {
  stopRecog();
  S.phase = 'result';
  S.transcript = transcript;
  setStatus('RESULT');

  const textJp = curTurn().text_jp || '';
  const pct  = matchPct(transcript, expected);
  const pass = pct >= 60;
  const { missing, extra } = diff(transcript, expected);
  const isLast = S.turnIdx === 3;

  const missLine = missing.length
    ? `<div class="diff-miss">・言えなかった単語: <strong>${missing.join(', ')}</strong></div>`
    : `<div>・言えなかった単語: なし 👍</div>`;
  const xtraLine = extra.length
    ? `<div class="diff-xtra">・余分な単語: <strong>${extra.join(', ')}</strong></div>`
    : `<div>・余分な単語: なし</div>`;

  setBody(`
    <div class="rsec">
      <div class="rlbl mono">あなたの発話</div>
      <div class="rtxt">${transcript ? esc(transcript)
        : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
    </div>
    <div class="rsec">
      <div style="display:flex;align-items:center;margin-bottom:5px">
        <div class="rlbl mono" style="margin-bottom:0">模範解答</div>
        <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(expected)})">🔊 正しい発音を聞く</button>
      </div>
      <div class="rtxt">${esc(expected)}</div>
      ${textJp ? `<div class="text-jp">${esc(textJp)}</div>` : ''}
    </div>
    <div class="badge ${pass?'pass':'fail'}">
      ${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}% 一致
    </div>
    <div class="diff-box">
      <div class="diff-hd mono">違いのチェック</div>
      ${missLine}${xtraLine}
    </div>
    <div class="btn-row">
      <button class="btn btn-sub" onclick="retryTurn()">もう一度</button>
      <button class="btn btn-primary" onclick="nextTurn()">${isLast?'完了 →':'次へ →'}</button>
    </div>
  `);
}

function retryTurn() { speechSynthesis.cancel(); stopRecog(); startTurn(S.turnIdx); }

function nextTurn() {
  speechSynthesis.cancel();
  stopRecog();
  const next = S.turnIdx + 1;
  if (next < 4) { setProgress(next); startTurn(next); }
  else phStartFullConv();   // ステップ練習完了 → 通し会話へ
}

// ─── FULL CONVERSATION ────────────────────────────────────
function phStartFullConv() {
  S.phase = 'fc-intro';
  setStatus('FULL CONVERSATION');
  setProgress(4);
  setBody(`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:1.6rem;margin-bottom:10px">🎤</div>
      <div style="font-family:'Courier New',monospace;font-size:.75rem;letter-spacing:.18em;
        color:var(--accent);font-weight:700;margin-bottom:12px">FULL CONVERSATION</div>
      <p style="font-size:.86rem;color:rgba(18,33,61,.7);line-height:1.65;margin-bottom:20px">
        4ターンを通して会話してみましょう。<br>ヒントも模範解答も表示しません。<br>終わったら振り返りを確認できます。
      </p>
      <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="startFullConv()">通し練習を始める →</button>
      <button class="reset-btn" onclick="phClear()">スキップしてクリア</button>
    </div>
  `);
}

function startFullConv() {
  S.fullConv = true;
  S.fullConvLogs = [];
  fcTurn(0);
}

function setFCProgress(idx) {
  const f = $id('prog-fill'); if (f) f.style.width = Math.round((idx+1)/4*100)+'%';
  const l = $id('turn-lbl'); if (l) l.textContent = `FULL CONV ${idx+1} / 4`;
}

function fcTurn(idx) {
  S.turnIdx = idx;
  setFCProgress(idx);
  const turn = S.scenario.turns[idx];
  if (turn.speaker === 'agent') {
    setStatus('FULL CONV');
    setBody(`
      <div class="sp-lbl mono">STAFF / PARTNER</div>
      <div class="agent-box">${esc(turn.text)}</div>
      ${turn.text_jp ? `<div class="text-jp">${esc(turn.text_jp)}</div>` : ''}
      <div style="font-size:.73rem;color:rgba(18,33,61,.4);margin-top:6px">次のターンへ進んでいます...</div>
    `);
    speak(turn.text, () => {
      if (!S.fullConv) return;
      if (idx + 1 < 4) fcTurn(idx + 1); else fcReview();
    });
  } else {
    setStatus('YOUR TURN');
    setBody(`
      <div class="sp-lbl mono">YOUR TURN</div>
      <div class="hint-box">
        <div class="hint-lbl mono">HINT</div>
        ${esc(turn.hint||'')}
      </div>
      ${micHtml()}
    `);
    setTimeout(() => launchMicFC(turn.text, idx), 400);
  }
}

function launchMicFC(expected, idx) {
  const area = $id('mic-area');
  if (!area) return;
  if (S.useFallback) {
    area.innerHTML = `
      <p style="font-size:.76rem;color:rgba(18,33,61,.45);margin-bottom:8px">音声認識が利用できません</p>
      <div class="fb-area open">
        <input type="text" id="fb-in" placeholder="Type English here...">
        <button class="btn btn-sub" onclick="fcSubmitFB(${JSON.stringify(expected)},${idx})">送信</button>
      </div>`;
    $id('fb-in')?.focus();
    return;
  }
  area.innerHTML = `
    <div class="mic-row"><div class="mic-dot"></div>録音中... （2.5秒の無音で自動確定）</div>
    <div class="live-transcript" id="live-transcript"></div>
    <button class="btn btn-primary btn-confirm" onclick="forceConfirm()">✓ これで確定</button>
  `;
  startRecog(
    t => onFC(t, expected, idx),
    () => onFC('', expected, idx)
  );
}

function fcSubmitFB(expected, idx) {
  const v = ($id('fb-in')?.value||'').trim();
  recogDone = true; pendingOnResult = null;
  stopRecog();
  onFC(v, expected, idx);
}

function onFC(transcript, expected, idx) {
  stopRecog();
  const text_jp = S.scenario.turns[idx].text_jp || '';
  S.fullConvLogs.push({ turnNum: idx + 1, transcript, expected, text_jp });
  const next = idx + 1;
  if (next < 4) fcTurn(next); else fcReview();
}

function fcReview() {
  S.fullConv = false;
  setStatus('FC REVIEW');
  const l = $id('turn-lbl'); if (l) l.textContent = 'FULL CONV · DONE';
  const f = $id('prog-fill'); if (f) f.style.width = '100%';

  const items = S.fullConvLogs.map(log => {
    const pct = matchPct(log.transcript, log.expected);
    const pass = pct >= 60;
    const { missing, extra } = diff(log.transcript, log.expected);
    const missLine = missing.length
      ? `<div class="diff-miss">・言えなかった単語: <strong>${missing.join(', ')}</strong></div>`
      : `<div>・言えなかった単語: なし 👍</div>`;
    const xtraLine = extra.length
      ? `<div class="diff-xtra">・余分な単語: <strong>${extra.join(', ')}</strong></div>`
      : `<div>・余分な単語: なし</div>`;
    return `
      <div class="fc-review-item">
        <div class="rlbl mono">TURN ${log.turnNum} — あなたの発話</div>
        <div class="rtxt">${log.transcript ? esc(log.transcript) : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
        <div style="display:flex;align-items:center;margin:8px 0 5px">
          <div class="rlbl mono" style="margin-bottom:0">模範解答</div>
          <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(log.expected)})">🔊 発音を聞く</button>
        </div>
        <div class="rtxt" style="margin-bottom:6px">${esc(log.expected)}</div>
        ${log.text_jp ? `<div class="text-jp" style="margin-bottom:6px">${esc(log.text_jp)}</div>` : ''}
        <div class="badge ${pass?'pass':'fail'}">${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}% 一致</div>
        <div class="diff-box">
          <div class="diff-hd mono">違いのチェック</div>
          ${missLine}${xtraLine}
        </div>
      </div>`;
  }).join('');

  setBody(`
    <div style="font-family:'Courier New',monospace;font-size:.68rem;letter-spacing:.16em;
      color:var(--accent);margin-bottom:16px;font-weight:700">FULL CONVERSATION · REVIEW</div>
    ${items}
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="phClear()">クリア！ →</button>
  `);
}

  S.phase = 'clear';
  setStatus('SCENARIO CLEAR');
  setProgress(4);
  try { await api.post(`/api/scenarios/${S.scenario.id}/clear`); } catch(_) {}
  setBody(`
    <div class="clear-sc">
      <div class="clear-title mono">SCENARIO CLEAR</div>
      <div class="clear-sub">${esc(S.scenario.title_jp)} をクリアしました！</div>
      <button class="btn btn-primary" onclick="backToList()">← 一覧に戻る</button>
    </div>`);
}

function curTurn() { return S.scenario.turns[S.turnIdx]; }

function profField(id, label, val, type) {
  return `<div class="prof-field">

    <input class="prof-input" type="${type}" id="pf-${id}" value="${esc(String(val))}">
  </div>`;
}

async function saveProfile() {
  const get = id => $id('pf-'+id)?.value.trim();
  const body = {
    name_en:       get('name_en'),
    role_en:       get('role_en'),
    focus_en:      get('focus_en'),
    base_en:       get('base_en'),
    origin_en:     get('origin_en'),
    university_en: get('university_en'),
    purpose_en:    get('purpose_en'),
    stay_nights:   parseInt(get('stay_nights')||'0',10),
    hobbies_en:    get('hobbies_en'),
  };
  if (!body.name_en) { alert('Name is required'); return; }
  await api.put('/api/profile', body);
  S.profile = body;
  goHome();
}

function buildIntroData(p) {
  const formalPhrases = [
    { text: `Good morning everyone. I'm ${p.name_en}, joining you from the ${p.base_en} office.`,
      text_jp: `おはようございます。${p.base_en}オフィスから参りました、${p.name_en}です。` },
    { text: `I work as ${p.role_en}, focusing on ${p.focus_en}.`,
      text_jp: `私は${p.role_en}として、${p.focus_en}を担当しています。` },
    { text: `This is my first time visiting the Munich office.`,
      text_jp: `ミュンヘンオフィスへの訪問は今回が初めてです。` },
    { text: `I'm here this week for ${p.purpose_en}.`,
      text_jp: `今週は${p.purpose_en}のためにこちらに来ています。` },
    { text: `I'm looking forward to learning how your team works here.`,
      text_jp: `こちらのチームの働き方をぜひ学ばせてください。` },
    { text: `Please feel free to reach out to me anytime during my stay.`,
      text_jp: `滞在中はいつでも気軽に声をかけてください。` },
    { text: `Thank you, and I'm excited to work with you all.`,
      text_jp: `ありがとうございます。皆さんと一緒に仕事できることを楽しみにしています。` },
  ];
  const casualPhrases = [
    { text: `Hi, I'm ${p.name_en}, from the ${p.base_en} office.`,
      text_jp: `こんにちは、${p.base_en}オフィスの${p.name_en}です。` },
    { text: `I live in Setagaya, a residential area in Tokyo.`,
      text_jp: `東京の住宅街、世田谷に住んでいます。` },
    { text: `I'm originally from ${p.origin_en}, and I went to ${p.university_en}.`,
      text_jp: `出身は${p.origin_en}で、${p.university_en}に通っていました。` },
    { text: `Outside of work, I enjoy ${p.hobbies_en}.`,
      text_jp: `仕事以外では、${p.hobbies_en}を楽しんでいます。` },
    { text: `Shogi is a Japanese board game, a bit like chess.`,
      text_jp: `将棋は日本のボードゲームで、チェスに少し似ています。` },
    { text: `This is my first time in Munich, so any recommendations are welcome.`,
      text_jp: `ミュンヘンは初めてなので、おすすめがあればぜひ教えてください。` },
    { text: `It's really nice to meet you all in person.`,
      text_jp: `皆さんに直接お会いできて、本当に嬉しいです。` },
  ];
  const qaItems = [
    { q: `What is shogi exactly?`,
      a: `It's similar to chess, but captured pieces can return to the board, so the game stays complex until the very end.`,
      q_jp: `将棋って具体的にどんなゲームですか？`,
      a_jp: `チェスに似ていますが、取った駒を自分のものとして使えるので、最後まで複雑な展開が続きます。` },
    { q: `How long have you been playing tennis?`,
      a: `For many years now. I usually play on weekends, it's a good way to refresh.`,
      q_jp: `テニスはどのくらいやっているんですか？`,
      a_jp: `もう長年やっています。週末に主にプレーしていて、リフレッシュに最適です。` },
    { q: `What's Setagaya like?`,
      a: `It's a quiet residential area in western Tokyo, with lots of parks and small local shops.`,
      q_jp: `世田谷ってどんなところですか？`,
      a_jp: `東京の西側にある静かな住宅街で、公園や小さな地元のお店がたくさんあります。` },
    { q: `What's Kyoto like? You studied there, right?`,
      a: `Yes, I spent my university years there. It's full of temples and history, I really recommend visiting.`,
      q_jp: `京都ってどんなところですか？そこで勉強されたんですよね？`,
      a_jp: `はい、大学時代を過ごしました。お寺や歴史にあふれていて、ぜひ訪れてほしいです。` },
    { q: `What will you be working on at the hackathon?`,
      a: `We'll be testing how far we can go with AI-driven development, building a working prototype in a few days.`,
      q_jp: `ハッカソンでは何に取り組むんですか？`,
      a_jp: `AIを活用した開発でどこまでできるかを試し、数日間で動くプロトタイプを作ります。` },
    { q: `Is this your first time in Germany?`,
      a: `Yes, it is. I'm hoping to try some local food and see a bit of the city while I'm here.`,
      q_jp: `ドイツは初めてですか？`,
      a_jp: `はい、初めてです。滞在中にローカルフードを食べたり、少し街を見て回りたいです。` },
    { q: `How was the flight from Japan?`,
      a: `About twelve hours, so quite long, but it gave me time to rest and prepare.`,
      q_jp: `日本からのフライトはどうでしたか？`,
      a_jp: `約12時間でかなり長かったですが、休んで準備する時間になりました。` },
  ];
  return { formalPhrases, casualPhrases, qaItems };
}

// INTRO SCREEN
// ═══════════════════════════════════════════════════════════
function renderIntro() {
  const p = S.profile;
  const d = buildIntroData(p);
  const sec = S.introSection;
  const phrases = sec === 'A' ? d.formalPhrases : sec === 'B' ? d.casualPhrases : d.qaItems;
  S.intraPhrases = phrases;

  const sectionLabel = sec === 'A' ? 'FORMAL · MEETING' : sec === 'B' ? 'CASUAL · SOCIAL' : 'Q&A · FOLLOW-UP';

  let listHtml = '';
  if (sec === 'C') {
    listHtml = phrases.map((item, i) => `
      <div class="qa-row" onclick="startQA(${i})">
        <div class="qa-q-lbl mono">Q${i+1}</div>
        <div class="qa-q">${esc(item.q)}</div>
        <div class="qa-a">${esc(item.a)}</div>
      </div>`).join('');
  } else {
    listHtml = `<div class="phrase-list">` +
      phrases.map((item, i) => `
      <div class="phrase-row" onclick="startPhrase(${i})">
        <div class="phrase-num mono">PHRASE ${i+1}</div>
        <div class="phrase-en">${esc(item.text)}</div>
        <div class="phrase-jp">${esc(item.text_jp)}</div>
      </div>`).join('') +
      `</div>
      <button class="btn btn-outline full-intro-btn mono" onclick="startFullIntro()">
        ▶ FULL INTRODUCTION — 通し練習
      </button>`;
  }

  $app.innerHTML = `
  <div class="intro-w">
    <div class="intro-nav">
      <button class="btn-back mono" onclick="goHome()">← HOME</button>
      <div class="bw-title mono">MY INTRODUCTION</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn mono${sec==='A'?' active':''}" onclick="switchIntroSection('A')">A · FORMAL</button>
      <button class="tab-btn mono${sec==='B'?' active':''}" onclick="switchIntroSection('B')">B · CASUAL</button>
      <button class="tab-btn mono${sec==='C'?' active':''}" onclick="switchIntroSection('C')">C · Q&amp;A</button>
    </div>
    <div style="font-family:'Courier New',monospace;font-size:.6rem;letter-spacing:.18em;
      color:rgba(246,162,28,.5);margin-bottom:12px">${sectionLabel}</div>
    ${listHtml}
  </div>`;
}

function switchIntroSection(sec) {
  S.introSection = sec;
  stop();
  renderIntro();
}

// ─── PHRASE STEP PRACTICE ────────────────────────────────
function startPhrase(idx) {
  const d = buildIntroData(S.profile);
  const phrases = S.introSection === 'A' ? d.formalPhrases : d.casualPhrases;
  S.introPhrases = phrases;
  S.introPhraseIdx = idx;
  renderIntroPractice();
  intPhListen(phrases[idx]);
}

function renderIntroPractice() {
  const phrases = S.introPhrases;
  const idx = S.introPhraseIdx;
  const total = phrases.length;
  $app.innerHTML = `
  <div class="pw">
    <div class="pw-nav">
      <button class="btn-back mono" onclick="exitIntroPractice()">← INTRO</button>
    </div>
    <div class="pass">
      <div class="pass-hd">
        <div class="pass-en">${S.introSection === 'A' ? 'FORMAL INTRODUCTION' : 'CASUAL INTRODUCTION'}</div>
        <div class="pass-jp">${S.introSection === 'A' ? 'フォーマル版' : 'カジュアル版'}</div>
        <div class="pass-meta">
          <span class="turn-lbl mono" id="turn-lbl">PHRASE ${idx+1} / ${total}</span>
          <div class="prog-bar"><div class="prog-fill" id="prog-fill"
            style="width:${Math.round((idx)/total*100)}%"></div></div>
        </div>
      </div>
      <div class="sboard"><span class="stxt mono" id="stxt">· · · · · ·</span></div>
      <div class="pbody" id="pbody"></div>
    </div>
  </div>`;
}

function intPhListen(phrase) {
  S.introPhase = 'listen';
  setStatus('LISTEN');
  setBody(`
    <div class="sp-lbl mono">LISTEN</div>
    <div class="agent-box" id="agent-box">${esc(phrase.text)}</div>
    <div class="text-jp">${esc(phrase.text_jp)}</div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-outline" onclick="intReplayTTS()">🔊&nbsp; もう一度聞く</button>
      <button class="btn btn-sub" style="font-size:.75rem" onclick="intPhShadow()">スキップ →</button>
    </div>
  `);
  speak(phrase.text, () => { if (S.introPhase==='listen') intPhShadow(); });
}

function intReplayTTS() {
  speak(S.introPhrases[S.introPhraseIdx].text, () => { if (S.introPhase==='listen') intPhShadow(); });
}

function intPhShadow() {
  const phrase = S.introPhrases[S.introPhraseIdx];
  S.introPhase = 'shadow';
  setStatus('YOUR TURN: SHADOW');
  setBody(`
    <div class="sp-lbl mono">SHADOW THIS</div>
    <div class="agent-box">${esc(phrase.text)}</div>
    ${micHtml()}
  `);
  setTimeout(() => launchMic(phrase.text, onTranscriptIntro), 400);
}

function onTranscriptIntro(transcript, expected) {
  stopRecog();
  S.introPhase = 'result';
  setStatus('RESULT');
  const phrase = S.introPhrases[S.introPhraseIdx];
  const pct = matchPct(transcript, expected);
  const pass = pct >= 60;
  const { missing, extra } = diff(transcript, expected);
  const isLast = S.introPhraseIdx === S.introPhrases.length - 1;
  const missLine = missing.length
    ? `<div class="diff-miss">・言えなかった単語: <strong>${missing.join(', ')}</strong></div>`
    : `<div>・言えなかった単語: なし 👍</div>`;
  const xtraLine = extra.length
    ? `<div class="diff-xtra">・余分な単語: <strong>${extra.join(', ')}</strong></div>`
    : `<div>・余分な単語: なし</div>`;
  setBody(`
    <div class="rsec">
      <div class="rlbl mono">あなたの発話</div>
      <div class="rtxt">${transcript ? esc(transcript) : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
    </div>
    <div class="rsec">
      <div style="display:flex;align-items:center;margin-bottom:5px">
        <div class="rlbl mono" style="margin-bottom:0">模範</div>
        <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(expected)})">🔊</button>
      </div>
      <div class="rtxt">${esc(expected)}</div>
      <div class="text-jp">${esc(phrase.text_jp)}</div>
    </div>
    <div class="badge ${pass?'pass':'fail'}">${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}%</div>
    <div class="diff-box">
      <div class="diff-hd mono">違いのチェック</div>
      ${missLine}${xtraLine}
    </div>
    <div class="btn-row">
      <button class="btn btn-sub" onclick="intRetry()">もう一度</button>
      <button class="btn btn-primary" onclick="intNext()">${isLast?'完了 →':'次へ →'}</button>
    </div>
  `);
}

function intRetry() {
  speechSynthesis.cancel(); stopRecog();
  intPhListen(S.introPhrases[S.introPhraseIdx]);
}

function intNext() {
  speechSynthesis.cancel(); stopRecog();
  const next = S.introPhraseIdx + 1;
  if (next < S.introPhrases.length) {
    S.introPhraseIdx = next;
    const f = $id('prog-fill');
    if (f) f.style.width = Math.round(next/S.introPhrases.length*100)+'%';
    const l = $id('turn-lbl');
    if (l) l.textContent = `PHRASE ${next+1} / ${S.introPhrases.length}`;
    intPhListen(S.introPhrases[next]);
  } else {
    // all phrases done — back to intro list
    exitIntroPractice();
  }
}

function exitIntroPractice() { stop(); renderIntro(); }

// ─── FULL INTRODUCTION ────────────────────────────────────
function startFullIntro() {
  const d = buildIntroData(S.profile);
  S.introPhrases = S.introSection === 'A' ? d.formalPhrases : d.casualPhrases;
  S.introFullIdx = 0;
  S.introFullLogs = [];
  $app.innerHTML = `
  <div class="pw">
    <div class="pw-nav">
      <button class="btn-back mono" onclick="exitIntroPractice()">← INTRO</button>
    </div>
    <div class="pass">
      <div class="pass-hd">
        <div class="pass-en">FULL INTRODUCTION</div>
        <div class="pass-jp">${S.introSection === 'A' ? 'フォーマル通し練習' : 'カジュアル通し練習'}</div>
        <div class="pass-meta">
          <span class="turn-lbl mono" id="turn-lbl">PHRASE 1 / ${S.introPhrases.length}</span>
          <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="sboard"><span class="stxt mono" id="stxt">· · · · · ·</span></div>
      <div class="pbody" id="pbody"></div>
    </div>
  </div>`;
  fullIntroPhraseStep(0, 'shadow');
}

function fullIntroPhraseStep(idx, mode) {
  S.introFullIdx = idx;
  S.introPhase = 'full-' + mode;
  const phrase = S.introPhrases[idx];
  const total = S.introPhrases.length;
  const f = $id('prog-fill'); if (f) f.style.width = Math.round(idx/total*100)+'%';
  const l = $id('turn-lbl'); if (l) l.textContent = `PHRASE ${idx+1} / ${total}`;

  if (mode === 'shadow') {
    setStatus('FULL INTRO');
    setBody(`
      <div class="sp-lbl mono">LISTEN &amp; SHADOW</div>
      <div class="agent-box">${esc(phrase.text)}</div>
      <div class="text-jp">${esc(phrase.text_jp)}</div>
      ${micHtml()}
    `);
    // play then immediately open mic
    speak(phrase.text, () => {
      if (!S.introPhase.startsWith('full')) return;
      const area = $id('mic-area');
      if (!area) return;
      if (S.useFallback) { showFallback(area, phrase.text); return; }
      area.innerHTML = `
        <div class="mic-row"><div class="mic-dot"></div>録音中...</div>
        <div class="live-transcript" id="live-transcript"></div>
        <button class="btn btn-primary btn-confirm" onclick="forceConfirm()">✓ これで確定</button>`;
      startRecog(
        t => fullIntroOnResult(t, phrase.text, idx),
        () => fullIntroOnResult('', phrase.text, idx)
      );
    });
  }
}

function fullIntroOnResult(transcript, expected, idx) {
  stopRecog();
  S.introFullLogs.push({ idx, transcript, expected, text_jp: S.introPhrases[idx].text_jp });
  const next = idx + 1;
  if (next < S.introPhrases.length) {
    fullIntroPhraseStep(next, 'shadow');
  } else {
    fullIntroReview();
  }
}

function fullIntroReview() {
  S.introPhase = 'full-review';
  setStatus('REVIEW');
  const f = $id('prog-fill'); if (f) f.style.width = '100%';
  const l = $id('turn-lbl'); if (l) l.textContent = 'FULL INTRO · DONE';
  const items = S.introFullLogs.map(log => {
    const pct = matchPct(log.transcript, log.expected);
    const pass = pct >= 60;
    const { missing, extra } = diff(log.transcript, log.expected);
    const missLine = missing.length
      ? `<div class="diff-miss">・言えなかった: <strong>${missing.join(', ')}</strong></div>`
      : `<div>・言えなかった単語: なし 👍</div>`;
    const xtraLine = extra.length
      ? `<div class="diff-xtra">・余分: <strong>${extra.join(', ')}</strong></div>`
      : `<div>・余分な単語: なし</div>`;
    return `
      <div class="fc-review-item">
        <div class="rlbl mono">PHRASE ${log.idx+1}</div>
        <div class="rtxt">${log.transcript ? esc(log.transcript) : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>
        <div style="display:flex;align-items:center;margin:6px 0 4px">
          <div class="rlbl mono" style="margin-bottom:0">模範</div>
          <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(log.expected)})">🔊</button>
        </div>
        <div class="rtxt">${esc(log.expected)}</div>
        ${log.text_jp ? `<div class="text-jp" style="margin-bottom:5px">${esc(log.text_jp)}</div>` : ''}
        <div class="badge ${pass?'pass':'fail'}">${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}%</div>
        <div class="diff-box"><div class="diff-hd mono">チェック</div>${missLine}${xtraLine}</div>
      </div>`;
  }).join('');
  setBody(`
    <div style="font-family:'Courier New',monospace;font-size:.68rem;letter-spacing:.16em;
      color:var(--accent);margin-bottom:14px;font-weight:700">FULL INTRODUCTION · REVIEW</div>
    ${items}
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="exitIntroPractice()">
      ← INTRO 一覧に戻る
    </button>
  `);
}

function qaPhListen(item) {

function qaReplayQ() {

function qaPhAnswer() {

    : `<div>・余分な単語: なし</div>`;
  setBody(`
    <div class="rsec">
      <div class="rlbl mono">あなたの回答</div>
      <div class="rtxt">${transcript ? esc(transcript) : '<em style="opacity:.45">（聞き取れませんでした）</em>'}</div>

    <div class="rsec">
      <div style="display:flex;align-items:center;margin-bottom:5px">
        <div class="rlbl mono" style="margin-bottom:0">模範解答</div>
        <button class="btn-speak-model" onclick="speakOnly(${JSON.stringify(expected)})">🔊</button>
      </div>
      <div class="rtxt">${esc(expected)}</div>
      <div class="text-jp">${esc(item.a_jp)}</div>
    </div>
    <div class="badge ${pass?'pass':'fail'}">${pass?'✓ 合格':'✗ 要練習'}&nbsp;&nbsp;${pct}%</div>

function qaRetry() {
  speechSynthesis.cancel(); stopRecog();
  qaPhListen(S.introPhrases[S.introPhraseIdx]);
}

function qaNext() {
  speechSynthesis.cancel(); stopRecog();
  const next = S.introPhraseIdx + 1;
  if (next < S.introPhrases.length) {
    S.introPhraseIdx = next;
    const l = $id('turn-lbl');
    if (l) l.textContent = `Q ${next+1} / ${S.introPhrases.length}`;
    const f = $id('prog-fill');
    if (f) f.style.width = Math.round(next/S.introPhrases.length*100)+'%';
    qaPhListen(S.introPhrases[next]);

    exitIntroPractice();
  }
}

// NAVIGATION
// ═══════════════════════════════════════════════════════════
async function goHome() {
  stop(); S.screen = 'home';
  S.categories = await api.get('/api/categories');
  renderHome();
}

async function goProfile() {
  stop(); S.screen = 'profile';
  S.profile = await api.get('/api/profile');
  renderProfile();
}

async function goIntro() {
  stop(); S.screen = 'intro';
  if (!S.profile) S.profile = await api.get('/api/profile');
  S.introSection = 'A';
  renderIntro();
}

async function goScenarios(cat) {
  S.selectedCat = cat; S.screen = 'scenarios';
  S.scenarios = await api.get(`/api/scenarios?category=${cat}`);
  renderScenarios();
}

async function goPractice(id) {
  S.screen = 'practice';
  S.scenario = await api.get(`/api/scenarios/${id}`);
  S.turnIdx = 0;
  renderPractice();
}

function exitPractice() { stop(); goScenarios(S.selectedCat); }

async function backToList() {
  S.scenarios = await api.get(`/api/scenarios?category=${S.selectedCat}`);
  S.screen = 'scenarios';
  renderScenarios();
}

async function doReset() {
  if (!confirm('全ての進捗をリセットしますか？')) return;
  await api.post('/api/progress/reset');
  goHome();
}

function stop() {
  S.fullConv = false;
  stopRecog();
  speechSynthesis.cancel();
  clearTimeout(listenTimer);
}

(async () => {
  [S.categories, S.profile] = await Promise.all([
    api.get('/api/categories'),
    api.get('/api/profile'),
  ]);
  renderHome();
})();
